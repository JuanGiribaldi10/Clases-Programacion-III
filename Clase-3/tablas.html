<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de tablas</title>
</head>
<body>
    <a href="index.html">Volver</a>
    <h1>Tablas</h1>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellido</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Juan Pablo</td>
            <td>Giribaldi</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Pedro</td>
            <td>Diaz</td>
        </tr>
    </table>

    <h1>Tablas completa</h1>
    <caption>Titulo de la tabla</caption>
    <table border="1">
        <thead>
        <tr>
            <th rowspan="2">ID</th>
            <th colspan="2">Nombre completo</th>
        </tr>
        <tr>
            <th>Nombre</th>
            <th>Apellido</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>1</td>
            <td>Juan Pablo</td>
            <td>Giribaldi</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Pedro</td>
            <td>Diaz</td>
        </tr>
        <tr>
            <td>3</td>
            <td colspan="2">Carlos, Martinez</td>
        </tr>
        </tbody>
    </table>

</body>
</html>
